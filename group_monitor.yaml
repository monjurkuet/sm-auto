# Facebook Group Monitor Configuration

# Global settings
chrome_port: 9222
max_cycle_runtime_minutes: 45
db_persist: true
log_dir: output/logs

# Training data export
training_data:
  enabled: true
  repo_path: /root/codebase/training-data
  push_after_export: true

# Observation/knowledge export
observations:
  enabled: true
  repo_path: /root/codebase/hermesagent
  push_after_export: true

# LLM decision endpoint (for join/classify/organic decisions)
llm:
  base_url: https://llm.datasolved.org/v1
  model: z-ai/glm-5.1
  strong_model: z-ai/glm-5.1
  context_length: 262144

# Delay settings (applied between ALL tasks)
delays:
  mode: humanized
  base_ms: 3000
  jitter_ms: 2000
  burst_pause_every_min: 4
  burst_pause_every_max: 8
  burst_pause_min_ms: 15000
  burst_pause_max_ms: 45000
  error_backoff_multiplier: 1.75

# Phase Configuration
phases:
  info_scrape:
    enabled: true
    weight: 1
    max_per_run: 10
    default_interval_hours: 24

  posts_scrape:
    enabled: true
    weight: 4
    max_per_run: 10
    default_interval_hours: 6
    max_scrolls: 15

  detail_crawl:
    enabled: true
    weight: 3
    limit: 30

  join_group:
    enabled: true
    weight: 1
    max_per_run: 3
    min_join_interval_ms: 30000
    auto_join: false
    skip_if_questions: true

  search_groups:
    enabled: true
    weight: 1
    max_per_run: 3
    max_scrolls: 5
    queries:
      - "crypto bangladesh"
      - "bitcoin trading bd"
      - "cryptocurrency community bangla"
    discovery:
      min_members: 50
      max_members: 10000000
      require_public: false
      default_priority: 5
      auto_register: false

  check_membership:
    enabled: true
    weight: 1
    max_per_run: 10
    stale_after_hours: 24

  compute_vitality:
    enabled: true
    weight: 1

# Group-specific overrides
group_overrides:
 - group_id: "276632390946258"
   skip_posts_scrape: false
   skip_join: true
   notes: "Private group - Growing Bulls Community (previously skip_posts_scrape=true, changed to false to allow scraping)"
