# SM-Auto Framework Default Configuration
# Copy this file to your project root or ~/.sm_auto/config.yaml

# Browser Configuration
browser:
  headless: false  # Must be false for manual CAPTCHA handling
  window_width: 1920
  window_height: 1080
  user_agent: null  # Use nodriver default
  extra_args: []

# Chrome Profile Configuration
profiles:
  chrome_user_data_dir: null  # Auto-detect

# Human-like Delay Configuration
delays:
  wpm: 60  # Typing speed
  micro_delay_min: 0.08
  micro_delay_max: 0.20
  action_delay_min: 0.5
  action_delay_max: 2.5
  task_delay_min: 2.0
  task_delay_max: 8.0
  page_delay_min: 1.5
  page_delay_max: 4.0
  reading_pause_min: 3.0
  reading_pause_max: 12.0

# Network Interception Configuration
network:
  interception_enabled: true
  filters:
    - "graphql"
    - "api"
    - "ajax"
  ignored_mimes:
    - "image/"
    - "text/css"
    - "font/"
    - "application/font"

# Platform Configuration
platforms:
  facebook:
    base_url: "https://www.facebook.com"
    login_timeout: 120
  instagram:
    base_url: "https://www.instagram.com"
    login_timeout: 120
  tiktok:
    base_url: "https://www.tiktok.com"
    login_timeout: 120

# Logging Configuration
log_level: "INFO"
log_dir: "./logs"
