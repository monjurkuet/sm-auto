# SM-Auto Framework Configuration
# NO BACKWARD COMPATIBILITY - Clean Implementation

# Browser Configuration
browser:
  headless: false
  window_width: 1920
  window_height: 1080
  user_agent: null
  extra_args: []

# Chrome Profile Configuration
profiles:
  chrome_user_data_dir: null

# Human-like Delay Configuration
delays:
  wpm: 60
  micro_delay_min: 0.08
  micro_delay_max: 0.20
  action_delay_min: 0.5
  action_delay_max: 2.5
  task_delay_min: 2.0
  task_delay_max: 8.0
  page_delay_min: 1.5
  page_delay_max: 4.0
  reading_pause_min: 3.0
  reading_pause_max: 12.0

# Network Interception Configuration
network:
  interception_enabled: true
  filters:
    - "graphql"
    - "api"
    - "ajax"
  ignored_mimes:
    - "image/"
    - "text/css"
    - "font/"
    - "application/font"

# Platform Configuration
platforms:
  facebook:
    base_url: "https://www.facebook.com"
    login_timeout: 120
  instagram:
    base_url: "https://www.instagram.com"
    login_timeout: 120
  tiktok:
    base_url: "https://www.tiktok.com"
    login_timeout: 120

# Data Storage Configuration
storage:
  default_format: "mongodb"  # json, mongodb, both
  json_config:
    enabled: false
    output_dir: "./output"
    filename_template: "{platform}_{query}_{timestamp}.json"
  mongodb:
    enabled: true
    database: "sm_auto"
    collection: "facebook_marketplace"
    # Connection URI loaded from .env MONGODB_URI

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  output: "console"  # console, file, both
  log_dir: "./logs"
  enabled_modules: ["INFO" ]  # empty = all modules
  disabled_modules: []  # modules to silence
  format: "simple"  # simple, detailed
